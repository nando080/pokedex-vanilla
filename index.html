<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/interface/logo.svg" type="image/x-icon">
    <title>POKEDEX</title>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-img"><img src="img/interface/logo.svg" alt="pokedex"></div>
            <h1 class="title">POKEDEX</h1>
        </div>
        <div class="search-box">
            <div class="search-button">
                <img src="img/interface/search.svg" alt="search">
            </div>
            <!-- SEARCH BAR -->
            <div class="search-bar">
                <input type="text" name="search-input" id="search-input" placeholder="find a pokémon">
                <div class="close-button">
                    <img src="img/interface/close-search.svg" alt="close search">
                </div>
            </div>
        </div>
    </header>
</body>
</html>
